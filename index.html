<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PHS Whiteboard</title>

<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="whiteboard.css" />

<style>
/* -------- PAGE LINKS BUTTON -------- */

.pagesBtn{
  position:absolute;
  top:14px;
  right:64px;
  z-index:30;
  width:42px;
  height:42px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,.9);
  box-shadow:0 8px 24px rgba(0,0,0,.16);
  cursor:pointer;
  font-size:18px;
  backdrop-filter:blur(8px);
}

.pagesBtn:hover{
  background:#fff;
  transform:translateY(-1px);
}

/* -------- PAGE POPUP -------- */

.pagesPop{
  position:absolute;
  top:62px;
  right:14px;
  z-index:31;
  min-width:220px;
  padding:8px;
  border-radius:16px;
  background:rgba(255,255,255,.96);
  box-shadow:0 16px 40px rgba(0,0,0,.18);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  gap:4px;
}

.pagesPop a{
  display:block;
  padding:10px 12px;
  border-radius:10px;
  color:#111;
  text-decoration:none;
  font-size:14px;
}

.pagesPop a:hover{
  background:rgba(0,0,0,.06);
}

.is-hidden{
  display:none !important;
}
</style>

</head>

<body class="page-whiteboard">

<div class="toast" id="toast" aria-live="polite">Saved</div>

<main class="wb">

<!-- LEFT TOOLBAR -->

<aside class="dock" aria-label="Tools">

<button class="dockBtn is-active" data-tool="pen" title="Freehand (P)">✏️</button>
<button class="dockBtn" data-tool="line" title="Line (L)">／</button>
<button class="dockBtn" data-tool="rect" title="Rectangle (R)">▭</button>
<button class="dockBtn" data-tool="circle" title="Circle (C)">◯</button>
<button class="dockBtn" data-tool="arc" title="Arc (G)">⌒</button>
<button class="dockBtn" data-tool="arrow" title="Arrow (A)">➤</button>
<button class="dockBtn" data-tool="text" title="Text (T)">T</button>
<button class="dockBtn" data-tool="eraser" title="Eraser (E)">🧽</button>

<div class="dockSep"></div>

<button class="dockBtn" id="undoBtn">↶</button>
<button class="dockBtn" id="redoBtn">↷</button>

<div class="dockSep"></div>

<button class="dockBtn dockBtn--danger" id="clearBtn">🗑</button>

</aside>

<!-- STAGE -->

<section class="stageWrap">

<div class="stage" id="stage">

<div id="bgLayer">
<img id="bgImg" draggable="false" />
</div>

<canvas id="inkCanvas"></canvas>
<canvas id="uiCanvas"></canvas>

<!-- PAGE MENU BUTTON -->

<button
class="pagesBtn"
id="pagesBtn"
title="Other pages"
>☰</button>

<nav class="pagesPop is-hidden" id="pagesPop">

<a href="index.html">Whiteboard</a>

<a href="GridGenerate.html">Grid Generator</a>

<a href="OtrhotoIsoSheets.html">Orthographic → Isometric Sheets</a>

<a href="iso-reliever-pack-generator.html">
Iso Reliever Pack Generator
</a>

<a href="orthographic-to-isometric-challenge.html">
Orthographic → Isometric Challenge
</a>

<a href="simple_isometric.html">
Simple Isometric
</a>

<a href="isometric-orthographic-Match-Challenge.html">
Isometric ↔ Orthographic Match
</a>

</nav>

<!-- SETTINGS BUTTON -->

<button
class="gearBtn"
id="settingsBtn"
title="Board menu"
>⚙️</button>

</div>

<div class="hint">
Wheel zooms • Space + drag pans • Ctrl/Cmd bypasses snapping •
Ctrl/Cmd + Z undo • Ctrl/Cmd + Y redo
</div>

</section>

</main>

<script src="whiteboard.shared.js"></script>
<script src="whiteboard.geometry.js"></script>
<script src="whiteboard.render.js"></script>
<script src="whiteboard.io.js"></script>
<script src="whiteboard.ui.js"></script>
<script src="whiteboard.js"></script>

<script>

/* PAGE MENU */

const pagesBtn = document.getElementById("pagesBtn")
const pagesPop = document.getElementById("pagesPop")

function closePages(){
pagesPop.classList.add("is-hidden")
}

pagesBtn.addEventListener("click",e=>{
e.stopPropagation()

pagesPop.classList.toggle("is-hidden")
})

pagesPop.addEventListener("click",e=>{
e.stopPropagation()
})

document.addEventListener("click",closePages)

document.addEventListener("keydown",e=>{
if(e.key==="Escape") closePages()
})

</script>

</body>
</html>
